<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — NovaHub</title>
  <link rel="icon" href="assets/novahub_favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="glass-nav">
    <div class="container nav-content">
      <a href="index.html" class="logo"><img src="assets/novahub_logo.svg" alt="NovaHub" class="logo-img"></a>
      <div class="nav-links">
        <div class="search-wrap">
          <form class="search-box" onsubmit="event.preventDefault(); window.location.href='search.html?q='+document.getElementById('nav-search').value;">
            <input type="text" id="nav-search" placeholder="Search NovaHub...">
            <button type="submit">🔍</button>
          </form>
        </div>
        <a href="index.html" class="nav-link">Home</a>
        <a href="category.html" class="nav-link">Categories</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <button id="theme-toggle" class="icon-btn"><span id="theme-icon"></span></button>
      </div>
    </div>
  </nav>

  <!-- All content injected by JS -->
  <main id="item-root" style="min-height:60vh;"></main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo"><img src="assets/novahub_favicon.svg" alt="NH" class="logo-icon"><div><div>NovaHub &copy; 2026</div><div class="footer-tagline">Discover Everything You Need</div></div></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="blog.html">Blog</a><a href="search.html">Search</a></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/embeds.js"></script>
  <script src="js/comments.js"></script>
  <script>
    const obs = new IntersectionObserver(entries => entries.forEach(e => {if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}}),{threshold:0.07, rootMargin:'0px 0px -30px 0px'});
    function initReveal(){document.querySelectorAll('.reveal,.reveal-scale').forEach(el=>obs.observe(el));}

    function rippleInit(){
      document.querySelectorAll('.btn-primary,.btn-secondary,.btn-watch,.btn-buy,.btn-play').forEach(btn=>{
        btn.addEventListener('click',function(e){const r=document.createElement('span');r.className='ripple';const rect=this.getBoundingClientRect();const s=Math.max(rect.width,rect.height);r.style.cssText='width:'+s+'px;height:'+s+'px;left:'+(e.clientX-rect.left-s/2)+'px;top:'+(e.clientY-rect.top-s/2)+'px;';this.appendChild(r);setTimeout(()=>r.remove(),600);});
      });
    }

    function renderRelated(item) {
      const related = NOVAHUB_DATA.items.filter(x => x.categoryId === item.categoryId && x.id !== item.id).slice(0, 4);
      if (!related.length) return '';
      const renderCard = i => {
        const href = 'item.html?id=' + encodeURIComponent(i.id);
        if (['movie','book','game'].includes(i.type)) {
          const sub = i.director || i.author || i.developer || i.genre || '';
          return '<a href="'+href+'" class="card-poster reveal-scale" style="background-image:url(\''+i.image+'\');display:block;">' +
            '<div class="bg-zoom" style="background-image:url(\''+i.image+'\');"></div>' +
            '<div class="card-poster-content"><div class="card-poster-title">'+i.name+'</div>'+(sub?'<div class="card-poster-sub">'+sub+'</div>':'')+(i.rating?'<div class="card-poster-rating">★ '+i.rating+'</div>':'')+'</div></a>';
        }
        const pc = i.pricing && i.pricing.toLowerCase().includes('free') ? 'tag-free' : 'tag-paid';
        return '<div class="card reveal-scale" onclick="window.location.href=\''+href+'\'"><div class="card-header"><div class="card-icon">'+(i.name||'?').charAt(0)+'</div><div><div class="card-title">'+i.name+'</div><span class="tag '+pc+'">'+(i.pricing||'')+'</span></div></div><p class="card-desc">'+(i.shortDesc||'')+'</p></div>';
      };
      return '<div class="container" style="padding-bottom:24px;"><div class="section-title reveal" style="margin-bottom:24px;">You Might Like</div><div class="grid-4">'+related.map(renderCard).join('')+'</div></div>';
    }

    function getCTABtn(item) {
      if (item.type === 'movie' && item.watchLink) return '<a href="'+item.watchLink+'" target="_blank" class="btn-primary btn-watch" style="font-size:16px;padding:14px 32px;">▶ Watch Now</a>';
      if (item.type === 'book' && item.buyLink)   return '<a href="'+item.buyLink+'" target="_blank" class="btn-primary btn-buy" style="font-size:16px;padding:14px 32px;">🛒 Buy Book</a>';
      if (item.type === 'game' && item.playLink)  return '<a href="'+item.playLink+'" target="_blank" class="btn-primary btn-play" style="font-size:16px;padding:14px 32px;">🎮 Play Now</a>';
      if (item.affiliateLink) return '<a href="'+item.affiliateLink+'" target="_blank" class="btn-primary" style="font-size:16px;padding:14px 32px;">Use Full Version ➔</a>';
      return '';
    }

    function getEmbed(item) {
      if ((item.type === 'movie' || item.type === 'video') && (item.trailerUrl || item.embedId)) {
        const src = item.trailerUrl || 'https://www.youtube.com/embed/'+item.embedId;
        return '<iframe width="100%" height="460" src="'+src+'" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius:16px;display:block;"></iframe>';
      }
      if (item.type === 'game' && (item.trailerUrl || item.embedId)) {
        const src = item.trailerUrl || 'https://www.youtube.com/embed/'+item.embedId;
        return '<iframe width="100%" height="460" src="'+src+'" frameborder="0" allowfullscreen style="border-radius:16px;display:block;"></iframe>';
      }
      if (item.type === 'book' && item.embedId) return Embeds.renderGoogleBook(item.embedId);
      if (item.embedId === 'timer')    return Embeds.renderTimer();
      if (item.embedId === 'markdown') return Embeds.renderMarkdown();
      if (item.embedId === 'sandbox')  return Embeds.renderSandbox();
      if (item.embedId === 'text-ai')  return Embeds.renderTextAI();
      if (item.embedId === 'image-ai') return Embeds.renderImageAI();
      return '';
    }

    function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || '';
      const item = NOVAHUB_DATA.items.find(x => x.id === id);

      const root = document.getElementById('item-root');
      if (!item) {
        root.innerHTML = '<div class="page-header" style="text-align:center;"><h1 class="title-xl">Item Not Found</h1><p class="subtitle">We couldn\'t find what you\'re looking for.</p><a href="index.html" class="btn-primary">Back Home</a></div>';
        return;
      }

      document.title = item.name + ' — NovaHub';

      const metaRow = [
        item.genre && '<span>🎭 '+item.genre+'</span>',
        item.year && '<span>📅 '+item.year+'</span>',
        item.director && '<span>🎬 '+item.director+'</span>',
        item.author && '<span>✍ '+item.author+'</span>',
        item.developer && '<span>🕹 '+item.developer+'</span>',
        item.platforms && '<span>📱 '+item.platforms+'</span>',
        item.rating && '<span style="color:#FFD60A;font-weight:700;">★ '+item.rating+'</span>',
        item.pricing && '<span class="tag '+(item.pricing.toLowerCase().includes('free')?'tag-free':'tag-paid')+'">'+item.pricing+'</span>',
      ].filter(Boolean).join('');

      const cat = NOVAHUB_DATA.categories.find(c => c.id === item.categoryId) || {};
      const catLink = '<a href="category.html?cat='+item.categoryId+'" class="btn-secondary" style="font-size:16px;padding:14px 32px;">'+( cat.icon||'')+ ' Browse '+(cat.name||'Category')+'</a>';

      const prosCons = (item.pros && item.pros.length) ? (
        '<div class="grid-3 reveal" style="gap:32px;margin:64px 0;">' +
        '<div><h3 style="font-size:18px;font-weight:700;margin-bottom:14px;">✅ Pros</h3><ul style="color:var(--text-secondary);padding-left:20px;line-height:2;">'+item.pros.map(p=>'<li>'+p+'</li>').join('')+'</ul></div>' +
        '<div><h3 style="font-size:18px;font-weight:700;margin-bottom:14px;">❌ Cons</h3><ul style="color:var(--text-secondary);padding-left:20px;line-height:2;">'+(item.cons||[]).map(c=>'<li>'+c+'</li>').join('')+'</ul></div>' +
        '<div><h3 style="font-size:18px;font-weight:700;margin-bottom:14px;">🎯 Best For</h3><p style="color:var(--text-secondary);line-height:1.7;">'+(item.bestFor||'')+'</p></div>' +
        '</div>'
      ) : '';

      const embedHtml = getEmbed(item);
      const ctaBtn    = getCTABtn(item);

      root.innerHTML =
        '<div class="detail-header container reveal">' +
          (item.image ? '<img src="'+item.image+'" alt="'+item.name+'" class="detail-cover" loading="lazy">' : '') +
          '<h1 class="title-xl">'+item.name+'</h1>' +
          (metaRow ? '<div class="detail-meta-row">'+metaRow+'</div>' : '') +
          '<p class="subtitle" style="font-size:18px;max-width:820px;">'+(item.fullDesc||item.shortDesc||item.summary||'')+'</p>' +
          '<div class="detail-actions">'+ctaBtn+catLink+'</div>' +
        '</div>' +

        '<div class="container">' +
          (embedHtml ? '<div class="embed-container reveal"><div class="embed-label">Interactive Preview</div>'+embedHtml+'</div>' : '') +
          prosCons +
        '</div>' +

        renderRelated(item) +

        '<div class="container" style="padding-bottom:80px;">' +
          '<div id="comments-wrap"></div>' +
        '</div>';

      initReveal();
      rippleInit();

      // Comments
      Comments.render(item.id, 'comments-wrap');

      // Embed scripts
      if (item.embedId && ['timer','markdown','sandbox','text-ai','image-ai'].includes(item.embedId)) {
        setTimeout(() => Embeds.initScripts(item.embedId), 150);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
