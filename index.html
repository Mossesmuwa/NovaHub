<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaHub — Discover Everything You Need</title>
  <link rel="icon" href="assets/novahub_favicon.svg" type="image/svg+xml">
  <meta name="description" content="Discover movies, books, AI tools, games, videos and more on NovaHub — your global discovery platform.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="glass-nav">
    <div class="container nav-content">
      <a href="index.html" class="logo">
        <img src="assets/novahub_logo.svg" alt="NovaHub" class="logo-img">
      </a>
      <div class="nav-links">
        <div class="search-wrap">
          <form class="search-box" onsubmit="event.preventDefault(); window.location.href='search.html?q='+document.getElementById('global-search').value;">
            <input type="text" id="global-search" placeholder="Search movies, books, AI tools..." autocomplete="off">
            <button type="submit" aria-label="Search">🔍</button>
          </form>
        </div>
        <a href="index.html" class="nav-link active">Home</a>
        <a href="category.html" class="nav-link">Categories</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <a href="search.html" class="nav-link">Explore</a>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode" title="Toggle Dark/Light Mode">
          <span id="theme-icon"></span>
        </button>
      </div>
    </div>
  </nav>

  <main id="app-root"></main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo">
        <img src="assets/novahub_favicon.svg" alt="NH" class="logo-icon">
        <div>
          <div>NovaHub &copy; 2026</div>
          <div class="footer-tagline">Discover Everything You Need</div>
        </div>
      </div>
      <div class="footer-links">
        <a href="blog.html">Blog</a>
        <a href="category.html">Categories</a>
        <a href="search.html">Search</a>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/embeds.js"></script>
  <script src="js/news.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
