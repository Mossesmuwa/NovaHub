<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — NovaHub</title>
<link rel="icon" href="../assets/novahub_favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-glow:rgba(201,168,76,.15);--gold-glow2:rgba(201,168,76,.28);
  --gold-grad:linear-gradient(140deg,#E8C97A 0%,#C9A84C 55%,#9B7520 100%);
  --bg:#09090C;--bg2:#111116;--bg3:#18181F;
  --surf:rgba(255,255,255,.04);--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --t1:#F2F2F7;--t2:#AEAEB2;--t3:#636366;
  --r:16px;--rsm:10px;--rlg:24px;--ease:.28s cubic-bezier(.25,.46,.45,.94);
  --font:"Inter","SF Pro Display","Helvetica Neue",system-ui,sans-serif;
}
[data-theme=light]{--bg:#F5F5F7;--bg2:#fff;--bg3:#EBEBF0;--surf:rgba(0,0,0,.03);--border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);--t1:#1D1D1F;--t2:#424245;--t3:#6E6E73;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none} button{font-family:inherit;cursor:pointer}
.top-bar{padding:20px 28px;display:flex;align-items:center;justify-content:space-between}
.top-bar a{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--t2);transition:color var(--ease)}
.top-bar a:hover{color:var(--t1)}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surf);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--ease)}
.icon-btn:hover{background:var(--gold-glow);border-color:var(--gold-glow2);color:var(--gold)}
.page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 24px;position:relative;overflow:hidden}
.page-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(201,168,76,.08) 0%,transparent 60%);pointer-events:none}
.page-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.018) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 80%);pointer-events:none}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rlg);padding:44px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.auth-logo img{height:28px}
.auth-title{font-size:26px;font-weight:900;letter-spacing:-.03em;text-align:center;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:32px}
.auth-form{display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:7px}
.form-label{font-size:13px;font-weight:600;color:var(--t2)}
.form-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:13px 16px;font-family:var(--font);font-size:15px;color:var(--t1);outline:none;transition:border-color var(--ease),box-shadow var(--ease)}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.form-input::placeholder{color:var(--t3)}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:99px;background:var(--gold-grad);color:#09090C;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:var(--font);box-shadow:0 4px 20px rgba(201,168,76,.38);transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow var(--ease)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(201,168,76,.5)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-oauth{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 24px;border-radius:99px;border:1px solid var(--border2);background:var(--surf);color:var(--t1);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:var(--ease);width:100%}
.btn-oauth:hover{background:var(--bg3)}
.btn-oauth svg{width:18px;height:18px;flex-shrink:0}
.divider-row{display:flex;align-items:center;gap:12px;margin:4px 0}
.divider-row span{font-size:12px;color:var(--t3);font-weight:500;white-space:nowrap}
.divider-row::before,.divider-row::after{content:"";flex:1;height:1px;background:var(--border2)}
.form-error{background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.25);border-radius:var(--rsm);padding:12px 16px;font-size:13px;color:#FF453A;display:none}
.form-error.visible{display:block}
.form-success{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.25);border-radius:var(--rsm);padding:12px 16px;font-size:13px;color:#30D158;display:none}
.form-success.visible{display:block}
.forgot-link{font-size:13px;color:var(--t3);text-align:right;margin-top:-8px}
.forgot-link a{color:var(--gold)}
.anon-note{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:14px 16px;font-size:13px;color:var(--t2);margin-top:8px;line-height:1.55}
.anon-note strong{color:var(--t1)}
.auth-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--t2)}
.auth-footer a{color:var(--gold);font-weight:700}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    Back to NovaHub
  </a>
  <button class="icon-btn" id="theme-btn"><span id="theme-icon"></span></button>
</div>

<div class="page-wrap">
  <div class="page-bg"></div>
  <div class="page-grid"></div>
  <div class="auth-card">
    <div class="auth-logo"><img src="../assets/novahub_logo.svg" alt="NovaHub"></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your NovaHub account</p>

    <button class="btn-oauth" onclick="NovaAuth.loginWithGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <button class="btn-oauth" style="margin-top:10px" onclick="NovaAuth.loginWithGithub()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      Continue with GitHub
    </button>

    <div class="divider-row"><span>or sign in with email</span></div>

    <div class="auth-form">
      <div class="form-error" id="form-error"></div>
      <div class="form-success" id="form-success"></div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password">
        <div class="forgot-link"><a href="forgot-password.html">Forgot password?</a></div>
      </div>
      <button class="btn-primary" id="signin-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <div class="anon-note">
      <strong>No account?</strong> Browse NovaHub anonymously and save up to 10 items — no sign up needed.
      <a href="../index.html" style="color:var(--gold);font-weight:700">Continue without account →</a>
    </div>
    <div class="auth-footer">Don't have an account? <a href="register.html">Create one free</a></div>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/auth.js"></script>
<script>
async function handleLogin() {
  const email    = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn      = document.getElementById('signin-btn')
  const errEl    = document.getElementById('form-error')
  const sucEl    = document.getElementById('form-success')

  errEl.classList.remove('visible')
  sucEl.classList.remove('visible')

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.'
    errEl.classList.add('visible')
    return
  }

  btn.disabled = true
  btn.textContent = 'Signing in…'

  const result = await NovaAuth.login(email, password)
  btn.disabled = false
  btn.textContent = 'Sign In'

  if (!result.success) {
    errEl.textContent = result.error === 'Invalid login credentials'
      ? 'Incorrect email or password. Please try again.'
      : result.error
    errEl.classList.add('visible')
    return
  }

  sucEl.textContent = '✦ Signed in! Redirecting…'
  sucEl.classList.add('visible')

  const returnUrl = new URLSearchParams(window.location.search).get('return') || '../account/dashboard.html'
  setTimeout(() => window.location.href = returnUrl, 800)
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin() })
NovaDB.getCurrentUser().then(user => { if (user) window.location.href = '../account/dashboard.html' })
</script>
</body>
</html>
