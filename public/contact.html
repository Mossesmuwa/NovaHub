<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NovaHub — Contact Us</title>
<link rel="icon" href="../assets/novahub_favicon.svg" type="image/svg+xml">
<meta name="description" content="Get in touch with NovaHub.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/ai-interface.css">
</head>
<body>

<!-- NAV -->
<nav class="glass-nav">
  <div class="container nav-content">
    <a href="index.html" class="logo">
      <img src="../assets/novahub_logo.svg" alt="NovaHub" style="height:28px; width:auto; display:block;">
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="category.html" class="nav-link">Browse</a>
      <a href="blog.html" class="nav-link">Blog</a>
      <a href="weekly.html" class="nav-link">The Weekly</a>
    </div>
    <div id="nav-auth-actions" style="display:flex; gap:8px;">
        <a href="account/login.html" style="font-size:13px; font-weight:600; padding:8px">Login</a>
    </div>
  </div>
</nav>

<main class="page-content container">
  <div class="static-page-hero">
    <h1 class="static-page-title">Contact Us</h1>
    <p class="static-page-sub">Have a question or wanting to request a new tool be added? Get in touch below.</p>
  </div>

  <div class="contact-wrap">
    <form onsubmit="event.preventDefault(); alert('Message Sent! We will get back to you shortly.');">
      <div class="input-grp">
        <label class="input-label">Full Name</label>
        <input type="text" class="input-field" placeholder="John Doe" required>
      </div>
      
      <div class="input-grp">
        <label class="input-label">Email Address</label>
        <input type="email" class="input-field" placeholder="email@example.com" required>
      </div>

      <div class="input-grp">
        <label class="input-label">Topic</label>
        <select class="input-field" required>
          <option value="" disabled selected>Select a topic...</option>
          <option value="general">General Inquiry</option>
          <option value="request">Suggest a tool or item</option>
          <option value="support">Technical Support</option>
          <option value="business">Business / Partnerships</option>
        </select>
      </div>

      <div class="input-grp">
        <label class="input-label">Message</label>
        <textarea class="input-field" placeholder="How can we help?" required></textarea>
      </div>

      <button type="submit" class="btn-primary" style="width:100%; justify-content:center; padding:16px;">
        Send Message
      </button>
    </form>
  </div>
</main>

<footer class="footer">
  <div class="container" style="text-align:center; font-size:13px; color:var(--t3)">
    <div style="margin-bottom: 16px; display: flex; justify-content: center; gap: 16px;">
        <a href="index.html">Home</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html" style="color:var(--t1)">Contact Us</a>
    </div>
    NovaHub © 2026 — Built by Mosses Muwa
  </div>
</footer>

<script src="../js/theme.js"></script>
</body>
</html>
