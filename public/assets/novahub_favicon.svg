<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="55%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9B7520"/>
    </linearGradient>
    <filter id="fg2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1E1812"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>

  <!-- Network nodes -->
  <circle cx="32" cy="13" r="4"   fill="url(#fg)" filter="url(#fg2)"/>
  <circle cx="13" cy="42" r="3.5" fill="url(#fg)" filter="url(#fg2)"/>
  <circle cx="51" cy="42" r="3.5" fill="url(#fg)" filter="url(#fg2)"/>
  <circle cx="32" cy="54" r="3"   fill="url(#fg)" opacity="0.65"/>

  <!-- Network lines -->
  <line x1="32" y1="13" x2="13" y2="42" stroke="url(#fg)" stroke-width="1.6" opacity="0.6"/>
  <line x1="32" y1="13" x2="51" y2="42" stroke="url(#fg)" stroke-width="1.6" opacity="0.6"/>
  <line x1="13" y1="42" x2="51" y2="42" stroke="url(#fg)" stroke-width="1.4" opacity="0.35"/>
  <line x1="13" y1="42" x2="32" y2="54" stroke="url(#fg)" stroke-width="1.2" opacity="0.4"/>
  <line x1="51" y1="42" x2="32" y2="54" stroke="url(#fg)" stroke-width="1.2" opacity="0.4"/>
</svg>
