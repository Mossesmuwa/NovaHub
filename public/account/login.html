<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Sign In — NovaHub</title>
<link rel="icon" href="../../assets/novahub_favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/components.css">
<link rel="stylesheet" href="../../css/ai-interface.css">
</head>
<body>
<div class="top-bar">
  <a href="../index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg> NovaHub</a>
  <button class="icon-btn" id="theme-btn"><span id="theme-icon"></span></button>
</div>

<div class="page-wrap">
  <div class="page-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">
        <img src="../../assets/novahub_logo.svg" alt="NovaHub" style="height:28px; width:auto; display:block;">
      </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your NovaHub account</p>

    <button class="btn-oauth" id="google-btn">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <button class="btn-oauth" id="github-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      Continue with GitHub
    </button>

    <div class="divider-row"><span>or sign in with email</span></div>

    <div class="form-err" id="err"></div>
    <div class="form-ok"  id="ok"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <div class="forgot"><a href="forgot-password.html">Forgot password?</a></div>
    </div>
    <button class="btn-primary" id="signin-btn">Sign In</button>

    <div class="anon-note">
      No account? Browse NovaHub and save up to 10 items — no sign up needed.
      <a href="../index.html" style="color:var(--gold);font-weight:700">Continue anonymously →</a>
    </div>
    <div class="auth-footer">New to NovaHub? <a href="register.html">Create free account</a></div>
  </div>
</div>

<script src="../../js/supabase.js"></script>
<script src="../../js/theme.js"></script>
<script src="../../js/auth.js"></script>
<script>
'use strict';
document.getElementById('google-btn').addEventListener('click', function() { NovaAuth.loginWithGoogle(); });
document.getElementById('github-btn').addEventListener('click', function() { NovaAuth.loginWithGithub(); });

document.getElementById('signin-btn').addEventListener('click', doLogin);
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn      = document.getElementById('signin-btn');
  var err      = document.getElementById('err');
  var ok       = document.getElementById('ok');
  err.classList.remove('show'); ok.classList.remove('show');

  if (!email)    { err.textContent = 'Please enter your email.';    err.classList.add('show'); return; }
  if (!password) { err.textContent = 'Please enter your password.'; err.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Signing in…';
  var result = await NovaAuth.login(email, password);
  btn.disabled = false; btn.textContent = 'Sign In';

  if (!result.success) {
    err.textContent = result.error === 'Invalid login credentials' ? 'Incorrect email or password.' : result.error;
    err.classList.add('show');
    return;
  }
  ok.textContent = '✦ Signed in! Redirecting…';
  ok.classList.add('show');
  var ret = new URLSearchParams(window.location.search).get('return') || '../account/dashboard.html';
  setTimeout(function() { window.location.href = ret; }, 800);
}

// Redirect if already logged in
if (window.NovaDB) NovaDB.getCurrentUser().then(function(u) { if (u) window.location.href = '../account/dashboard.html'; });
</script>
</body>
</html>
