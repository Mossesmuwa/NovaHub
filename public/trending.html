    <a href="index.html" class="nav-link">Home</a>
    <a href="category.html" class="nav-link">Browse</a>
    <a href="trending.html" class="nav-link active">Trending</a>
    <a href="discover.html" class="nav-link">Discover</a>

<main class="page-content">

  <!-- HERO -->
  <div class="trending-hero" style="text-align:center;padding:calc(var(--nav)+48px) 20px 36px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(201,168,76,.09) 0%,transparent 60%);pointer-events:none"></div>
    <div style="position:relative;z-index:1">
      <div style="display:inline-flex;align-items:center;gap:9px;background:var(--gold-glow);border:1px solid var(--gold-glow2);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulseDot 2.4s ease-in-out infinite;flex-shrink:0"></span>
        Live · Updated Hourly
      </div>
      <h1 style="font-size:clamp(32px,7vw,60px);font-weight:900;letter-spacing:-.05em;margin-bottom:10px">🔥 Trending Now</h1>
      <p style="font-size:16px;color:var(--t2);max-width:460px;margin:0 auto">What NovaHub users are saving, clicking, and talking about right now.</p>
    </div>
  </div>

  <div class="container" style="padding-bottom:80px">

    <!-- FILTERS -->
    <div class="filter-bar" style="margin-top:8px">
      <span class="filter-label">Category</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="cat-filters">
        <button class="sort-pill active" data-cat="all"         onclick="setCat('all',this)">All</button>
        <button class="sort-pill"        data-cat="movies"      onclick="setCat('movies',this)">🍿 Movies</button>
        <button class="sort-pill"        data-cat="ai-tools"    onclick="setCat('ai-tools',this)">✨ AI Tools</button>
        <button class="sort-pill"        data-cat="books"       onclick="setCat('books',this)">📚 Books</button>
        <button class="sort-pill"        data-cat="games"       onclick="setCat('games',this)">🎮 Games</button>
        <button class="sort-pill"        data-cat="security"    onclick="setCat('security',this)">🔐 Security</button>
      </div>
      <div class="filter-right">

    <!-- RANK LIST + GRID -->

<div id="nova-toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/items.js"></script>
<script src="../js/favorites.js"></script>
<script>
'use strict';
var allItems=[], currentCat='all';

window.addEventListener('scroll',function(){ document.getElementById('main-nav').classList.toggle('scrolled',scrollY>48); },{passive:true});
document.getElementById('mobile-btn').addEventListener('click',function(){ document.getElementById('mobile-menu').classList.toggle('open'); });
document.getElementById('global-search').addEventListener('keydown',function(e){ if(e.key==='Enter'&&this.value.trim()) window.location.href='search.html?q='+encodeURIComponent(this.value.trim()); });
document.getElementById('mobile-search-input').addEventListener('keydown',function(e){ if(e.key==='Enter'&&this.value.trim()) window.location.href='search.html?q='+encodeURIComponent(this.value.trim()); });

function toast(msg,type){ var c=document.getElementById('nova-toasts'); var el=document.createElement('div'); el.className='nova-toast'; el.innerHTML='<span style="color:var(--gold);font-size:15px">✦</span><span>'+msg+'</span>'; c.appendChild(el); setTimeout(function(){ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(function(){ el.remove(); },300); },2800); }
if(!window.NovaUI) window.NovaUI={}; window.NovaUI.toast=toast;

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('#cat-filters .sort-pill').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  var items=currentCat==='all' ? allItems : allItems.filter(function(i){ return i.category_id===currentCat; });
  var countEl=document.getElementById('item-count');
  var listEl=document.getElementById('trending-list');
  if(countEl) countEl.innerHTML='<strong>'+items.length+'</strong> trending';
  if(!items.length){ listEl.innerHTML='<div class="empty-state"><span class="empty-state-icon">📭</span><h3>Nothing trending here yet</h3><p>Add items and mark them trending in Supabase.</p></div>'; return; }

  /* Top 3 highlight + rest as grid */
  var top=items.slice(0,3);
  var rest=items.slice(3);

  var html='<div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:32px">';
  top.forEach(function(item,i){
    var href='item.html?slug='+encodeURIComponent(item.slug);
    var rank=['🥇','🥈','🥉'][i];
    html+='<a href="'+href+'" style="background:var(--bg2);border:1px solid var(--border'+(i===0?'2':'') +');border-radius:var(--rlg);padding:18px 20px;display:flex;align-items:center;gap:16px;color:inherit;text-decoration:none;transition:var(--spring)" onmouseover="this.style.borderColor=\'var(--gold-glow2)\'" onmouseout="this.style.borderColor=\''+(i===0?'var(--border2)':'var(--border)')+'\'">'
      +'<div style="font-size:28px;flex-shrink:0;width:44px;text-align:center">'+rank+'</div>'
      +(item.image?'<img src="'+_esc(item.image)+'" style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0" loading="lazy">':'<div style="width:52px;height:52px;border-radius:8px;background:var(--gold-glow);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+_esc((item.name||'?').charAt(0))+'</div>')
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:15px;font-weight:800;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(item.name)+'</div>'
        +'<div style="font-size:12px;color:var(--t3)">'+_esc(item.category_id||'')+(item.rating?' · ★ '+item.rating:'')+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
        +(item.save_count?'<span style="font-size:12px;color:var(--t3)">♥ '+item.save_count+'</span>':'')
        +'<div style="background:var(--gold-glow);border:1px solid var(--gold-glow2);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap">🔥 Hot</div>'
      +'</div>'
    +'</a>';
  });
  html+='</div>';

  if(rest.length){
    html+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px" class="stagger" id="rest-grid">';
    rest.forEach(function(item,i){
      var href='item.html?slug='+encodeURIComponent(item.slug);
      html+='<a href="'+href+'" class="reveal-scale" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;color:inherit;text-decoration:none;transition:var(--spring)" onmouseover="this.style.borderColor=\'var(--gold-glow2)\'" onmouseout="this.style.borderColor=\'var(--border)\'">'
        +'<div style="font-size:15px;font-weight:900;color:var(--t3);min-width:24px;text-align:center">'+(i+4)+'</div>'
        +(item.image?'<img src="'+_esc(item.image)+'" style="width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0" loading="lazy">':'<div style="width:40px;height:40px;border-radius:6px;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+_esc((item.name||'?').charAt(0))+'</div>')
        +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(item.name)+'</div><div style="font-size:11px;color:var(--t3)">'+_esc(item.category_id||'')+'</div></div>'
      +'</a>';
    });
    html+='</div>';
  }

  listEl.innerHTML=html;

  /* Animate rest grid */
  var rg=document.getElementById('rest-grid');
  if(rg){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(!e.isIntersecting) return;
        e.target.classList.add('visible');
        Array.from(e.target.children).forEach(function(c,i){ c.style.transitionDelay=(i*.05)+'s'; c.classList.add('visible'); });
        io.unobserve(e.target);
      });
    },{threshold:.05});
    io.observe(rg);
  }

  setTimeout(function(){ if(window.NovaFavorites) NovaFavorites.initAll(); },80);
}

document.addEventListener('DOMContentLoaded', async function(){
  if(window.NovaAuth) NovaAuth.updateNavUI();

  document.getElementById('trending-list').innerHTML=
    '<div style="text-align:center;padding:80px;color:var(--t3)"><div style="width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px"></div>Loading…</div>';

  try {
    allItems = await NovaItems.getTrending(32);
    render();
  } catch(err){
    document.getElementById('trending-list').innerHTML='<div class="empty-state"><span class="empty-state-icon">⚠</span><h3>Could not load trending</h3><p>Check your Supabase connection.</p></div>';
  }
});
</script>
</body>
</html>
