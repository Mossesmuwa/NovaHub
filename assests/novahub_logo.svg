<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 52" width="320" height="52">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="55%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9B7520"/>
    </linearGradient>
    <filter id="ng2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .nh-hub { fill: #1D1D1F; }
      @media (prefers-color-scheme: dark) { .nh-hub { fill: #F2F2F7; } }
      [data-theme="dark"] .nh-hub { fill: #F2F2F7; }
      [data-theme="light"] .nh-hub { fill: #1D1D1F; }
    </style>
  </defs>

  <!-- Icon: dark pill -->
  <rect x="0" y="2" width="48" height="48" rx="12" fill="#1E1812"/>
  <rect x="0" y="2" width="48" height="48" rx="12" fill="none" stroke="url(#ng)" stroke-width="1" opacity="0.45"/>

  <!-- Network nodes -->
  <circle cx="24" cy="12" r="3.5" fill="url(#ng)" filter="url(#ng2)"/>
  <circle cx="11" cy="32" r="3"   fill="url(#ng)" filter="url(#ng2)"/>
  <circle cx="37" cy="32" r="3"   fill="url(#ng)" filter="url(#ng2)"/>
  <circle cx="24" cy="42" r="2.5" fill="url(#ng)" opacity="0.7"/>

  <!-- Network lines -->
  <line x1="24" y1="12" x2="11" y2="32" stroke="url(#ng)" stroke-width="1.4" opacity="0.55"/>
  <line x1="24" y1="12" x2="37" y2="32" stroke="url(#ng)" stroke-width="1.4" opacity="0.55"/>
  <line x1="11" y1="32" x2="37" y2="32" stroke="url(#ng)" stroke-width="1.2" opacity="0.35"/>
  <line x1="11" y1="32" x2="24" y2="42" stroke="url(#ng)" stroke-width="1.1" opacity="0.38"/>
  <line x1="37" y1="32" x2="24" y2="42" stroke="url(#ng)" stroke-width="1.1" opacity="0.38"/>

  <!-- Nova (gold) -->
  <text
    x="60" y="40"
    font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="32"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#ng)">Nova</text>

  <!-- Hub (adapts to theme) -->
  <text
    x="183" y="40"
    font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="32"
    font-weight="900"
    letter-spacing="-1"
    class="nh-hub">Hub</text>
</svg>
