<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — NovaHub Insights</title>
  <link rel="icon" href="assets/novahub_favicon.svg" type="image/svg+xml">
  <meta name="description" content="Guides, reviews, and the best of the internet — curated by NovaHub editors.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="glass-nav">
    <div class="container nav-content">
      <a href="index.html" class="logo"><img src="assets/novahub_logo.svg" alt="NovaHub" class="logo-img"></a>
      <div class="nav-links">
        <div class="search-wrap">
          <form class="search-box" onsubmit="event.preventDefault(); window.location.href='search.html?q='+document.getElementById('nav-search').value;">
            <input type="text" id="nav-search" placeholder="Search NovaHub...">
            <button type="submit">🔍</button>
          </form>
        </div>
        <a href="index.html" class="nav-link">Home</a>
        <a href="category.html" class="nav-link">Categories</a>
        <a href="blog.html" class="nav-link active">Blog</a>
        <button id="theme-toggle" class="icon-btn"><span id="theme-icon"></span></button>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h1 class="title-xl">NovaHub Insights</h1>
    <p class="subtitle">Guides, reviews, and the best of the internet — curated by our editors.</p>
  </div>

  <main class="container" id="blog-list" style="padding-bottom:80px;max-width:960px;margin:0 auto;"></main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo"><img src="assets/novahub_favicon.svg" alt="NH" class="logo-icon"><div><div>NovaHub &copy; 2026</div><div class="footer-tagline">Discover Everything</div></div></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="search.html">Search</a><a href="category.html">Categories</a></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script>
    const obs = new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}}),{threshold:0.07});
    function initReveal(){document.querySelectorAll('.reveal,.reveal-scale').forEach(el=>obs.observe(el));}

    document.addEventListener('DOMContentLoaded', () => {
      const posts = NOVAHUB_DATA.blogPosts;
      const list = document.getElementById('blog-list');
      list.innerHTML = '<div style="display:flex;flex-direction:column;gap:24px;">' +
        posts.map(p =>
          '<a href="post.html?id='+p.id+'" class="blog-card reveal" style="display:flex;text-decoration:none;">' +
            '<div class="blog-card-img" style="background-image:url(\''+p.image+'\');width:260px;flex-shrink:0;min-height:190px;"></div>' +
            '<div class="blog-card-body">' +
              '<div class="blog-card-cat">'+p.category+'</div>' +
              '<div class="blog-card-title">'+p.title+'</div>' +
              '<div class="blog-card-excerpt">'+p.excerpt+'</div>' +
              '<div class="blog-card-date">By '+p.author+' · '+p.date+'</div>' +
            '</div>' +
          '</a>'
        ).join('') +
      '</div>';
      initReveal();
    });
  </script>
</body>
</html>
