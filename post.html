<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — NovaHub Insights</title>
  <link rel="icon" href="assets/novahub_favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav class="glass-nav">
    <div class="container nav-content">
      <a href="index.html" class="logo"><img src="assets/novahub_logo.svg" alt="NovaHub" class="logo-img"></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="category.html" class="nav-link">Categories</a>
        <a href="blog.html" class="nav-link active">Blog</a>
        <button id="theme-toggle" class="icon-btn"><span id="theme-icon"></span></button>
      </div>
    </div>
  </nav>

  <main id="post-root" style="min-height:60vh;"></main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo"><img src="assets/novahub_favicon.svg" alt="NH" class="logo-icon"><div><div>NovaHub &copy; 2026</div><div class="footer-tagline">Discover Everything</div></div></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="blog.html">Blog</a><a href="search.html">Search</a></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/comments.js"></script>
  <script>
    const obs = new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}}),{threshold:0.07});
    function initReveal(){document.querySelectorAll('.reveal,.reveal-scale').forEach(el=>obs.observe(el));}

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || '';
      const post = NOVAHUB_DATA.blogPosts.find(p => p.id === id);
      const root = document.getElementById('post-root');

      if (!post) {
        root.innerHTML = '<div class="page-header" style="text-align:center;"><h1 class="title-xl">Post Not Found</h1><a href="blog.html" class="btn-primary">Back to Blog</a></div>';
        return;
      }

      document.title = post.title + ' — NovaHub';

      // Related posts
      const related = NOVAHUB_DATA.blogPosts.filter(p => p.id !== id && p.category === post.category).slice(0, 2);
      const relatedHtml = related.length ? (
        '<div style="margin-top:64px;">' +
          '<h3 style="font-size:22px;font-weight:700;margin-bottom:20px;">Related Articles</h3>' +
          '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;">' +
            related.map(r =>
              '<a href="post.html?id='+r.id+'" class="blog-card reveal" style="flex-direction:column;display:flex;text-decoration:none;">' +
                '<div style="height:160px;background-image:url(\''+r.image+'\');background-size:cover;background-position:center;width:100%;"></div>' +
                '<div class="blog-card-body">' +
                  '<div class="blog-card-cat">'+r.category+'</div>' +
                  '<div class="blog-card-title" style="font-size:16px;">'+r.title+'</div>' +
                '</div>' +
              '</a>'
            ).join('') +
          '</div>' +
        '</div>'
      ) : '';

      root.innerHTML =
        '<div style="max-width:760px;margin:0 auto;padding:128px 24px 0;">' +
          '<a href="blog.html" style="color:var(--accent-blue);font-size:14px;font-weight:600;">← Back to Blog</a>' +
          '<div style="font-size:13px;color:var(--accent-blue);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin:20px 0 12px;">'+post.category+'</div>' +
          '<h1 style="font-size:42px;font-weight:800;letter-spacing:-0.02em;line-height:1.15;margin-bottom:20px;">'+post.title+'</h1>' +
          '<div style="color:var(--text-secondary);font-size:14px;margin-bottom:32px;">By '+post.author+' · '+post.date+'</div>' +
          '<img src="'+post.image+'" alt="'+post.title+'" style="width:100%;border-radius:16px;margin-bottom:48px;box-shadow:var(--shadow-md);" loading="lazy">' +
          '<div style="font-size:18px;line-height:1.85;color:var(--text-secondary);">'+post.excerpt+'</div>' +
          '<div style="font-size:18px;line-height:1.85;color:var(--text-secondary);margin-top:28px;">'+
            (post.body || 'The full article is coming soon. In the meantime, explore our curated tools, movies, books, and games in the platform.') +
          '</div>' +
          relatedHtml +
          '<div id="post-comments-wrap" style="margin-top:64px;"></div>' +
        '</div>' +
        '<div style="padding-bottom:80px;"></div>';

      initReveal();
      Comments.render(post.id, 'post-comments-wrap');
    });
  </script>
</body>
</html>
